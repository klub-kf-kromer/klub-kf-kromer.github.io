title: "SP9... | Klub Krótkofalarski przy I LO w Gorlicach"
description: "Klub Krótkofalarski przy I LO im. M. Kromera w Gorlicach."
baseurl: ""
url: "https://klub-kf-kromer.github.io"

permalink: /blog/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge

collections:
  edukacja:
    output: true
    permalink: /edukacja/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "edukacja"
    values:
      layout: "edukacja_page"
  - scope:
      path: ""
      type: "portfolio"
    values:
      layout: "portfolio_page"
