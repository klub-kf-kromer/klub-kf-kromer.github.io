---
layout: default
---
<article style="max-width: 800px; margin: 0 auto; padding: 1rem 0;">
  <p style="color: var(--text-muted); font-family: 'Fira Code', monospace;">
    <a href="{{ '/edukacja/' | relative_url }}" style="color: var(--primary); text-decoration: none;">&larr; Powrót do materiałów</a>
  </p>
  <span style="background: var(--wave-color); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600;">
    {{ page.category }} | Poziom: {{ page.level }}
  </span>
  <h1 style="font-size: 2.2rem; margin: 1rem 0;">{{ page.title }}</h1>
  <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 2rem;">
  <div class="content" style="font-size: 1.05rem; line-height: 1.8;">
    {{ content }}
  </div>
</article>
